<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teodoro Anglų Kalbos Žodynas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0a1628 100%);
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container { max-width: 540px; width: 100%; padding: 32px 20px; }
 
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 {
    font-size: 32px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4ECDC4, #60A5FA, #A78BFA);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p { font-size: 15px; color: #94a3b8; }
 
  .unit-card {
    display: block;
    background: linear-gradient(135deg, #0f3460dd, #0f346099);
    border-radius: 16px; padding: 24px 28px; margin-bottom: 16px;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.3s ease;
    text-decoration: none; color: inherit;
  }
  .unit-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.3);
  }
  .unit-card .top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .unit-card .unit-title { font-size: 22px; font-weight: 800; }
  .unit-card .badge {
    display: inline-block; padding: 3px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .unit-card .unit-subtitle {
    font-size: 14px; font-weight: 600; margin-bottom: 4px;
  }
  .unit-card .unit-desc { font-size: 13px; color: #94a3b8; }
 
  /* Unit 3 colors */
  .card-3:hover { border-color: #4ECDC4; box-shadow: 0 12px 36px #4ECDC422; }
  .card-3 .unit-title { color: #4ECDC4; }
  .card-3 .unit-subtitle { color: #60A5FA; }
  .card-3 .badge { background: #4ECDC422; color: #4ECDC4; }
 
  /* Unit 4 colors */
  .card-4:hover { border-color: #F59E0B; box-shadow: 0 12px 36px rgba(245,158,11,0.15); }
  .card-4 .unit-title { color: #F59E0B; }
  .card-4 .unit-subtitle { color: #FB923C; }
  .card-4 .badge { background: #F59E0B22; color: #F59E0B; }
 
  .footer {
    text-align: center; margin-top: 32px;
    font-size: 12px; color: #475569;
  }
 
  @media (max-width: 480px) {
    .header h1 { font-size: 26px; }
    .unit-card { padding: 20px 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 Vocabulary Quiz</h1>
    <p>Pasirink temą ir pradėk mokytis!</p>
  </div>
 
  <a class="unit-card card-3" href="unit3/">
    <div class="top">
      <div class="unit-title">Unit 3</div>
      <span class="badge">47 Wörter</span>
    </div>
    <div class="unit-subtitle">Parts A, B & C</div>
    <div class="unit-desc">listen/hear, behind/in front of, chocolate, ghost, tired …</div>
  </a>
 
  <a class="unit-card card-4" href="unit4/">
    <div class="top">
      <div class="unit-title">Unit 4 — Weekends</div>
      <span class="badge">40 Wörter</span>
    </div>
    <div class="unit-subtitle">Intro + Part A</div>
    <div class="unit-desc">were/was, yesterday, exciting, island, life jacket, cinema …</div>
  </a>
 
  <div class="footer">Sėkmės! 🍀</div>
</div>
</body>
</html>
